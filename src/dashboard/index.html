<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTC 5-Min Bot</title>
  <style>
    :root { --green: #22c55e; --red: #ef4444; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 1rem; }
    header { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .hdr-stats { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .hdr-stat { text-align: center; }
    .hl { font-size: 1.25rem; font-weight: 700; }
    .sl { font-size: 0.75rem; color: #94a3b8; }
    .status { display: flex; align-items: center; gap: 0.5rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 50% { opacity: 0.5; } }
    nav { margin-bottom: 1rem; }
    nav button { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; margin-right: 0.5rem; }
    nav button.active { background: #334155; }
    .card { background: #1e293b; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .card-hdr { font-weight: 600; margin-bottom: 0.75rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid #334155; }
    .mono { font-family: ui-monospace, monospace; }
    .tag { padding: 0.2rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; }
    .t-yes { background: rgba(34,197,94,0.2); color: var(--green); }
    .t-no { background: rgba(239,68,68,0.2); color: var(--red); }
  </style>
</head>
<body>
<header>
  <div class="status" id="status"><span class="dot"></span><span id="status-text">CONNECTING</span></div>
  <div class="hdr-stats">
    <div class="hdr-stat"><div class="hl" id="h-btc">$—</div><div class="sl">BTC Spot</div></div>
    <div class="hdr-stat"><div class="hl" id="h-pnl">$0.00</div><div class="sl">Total P&L</div></div>
    <div class="hdr-stat"><div class="hl" id="h-bal">$10,000</div><div class="sl" id="h-bal-label">Balance</div></div>
    <div class="hdr-stat"><div class="hl" id="h-wr">—</div><div class="sl">Win Rate</div></div>
  </div>
</header>

<div class="tab-content active" id="tab-dashboard">
  <div class="card">
    <div class="card-hdr">Quick Stats</div>
    <div id="quick-stats">Equity: <span id="s-eq">$0</span> &nbsp; Daily P&L: <span id="s-daily">$0</span> &nbsp; Trades: <span id="s-trades">0</span> &nbsp; Positions: <span id="s-pos">0 / 5</span></div>
  </div>
  <div class="card">
    <div class="card-hdr">Positions</div>
    <div id="pos-empty">No open positions</div>
    <table id="pos-table" style="display:none"><thead><tr><th>Market</th><th>Side</th><th>Entry</th><th>P&L</th></tr></thead><tbody id="pos-tbody"></tbody></table>
  </div>
  <div class="card">
    <div class="card-hdr">Trade History</div>
    <table><thead><tr><th>Time</th><th>Side</th><th>Entry</th><th>Exit</th><th>P&L</th><th>Result</th></tr></thead><tbody id="trades-tbody"></tbody></table>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const F = n => (n == null || isNaN(n) ? '0.00' : Number(n).toFixed(2));
const cls = n => n >= 0 ? 'green' : 'red';
function render(d) {
  $('h-btc').textContent = d.btc_price ? '$' + F(d.btc_price) : '$—';
  $('h-pnl').textContent = '$' + (d.total_pnl >= 0 ? '+' : '') + F(d.total_pnl);
  $('h-pnl').className = 'hl ' + cls(d.total_pnl);
  $('h-bal').textContent = '$' + F(d.balance);
  $('h-bal-label').textContent = d.balance_source === 'kalshi' ? 'Balance (Kalshi)' : 'Balance';
  $('h-wr').textContent = d.total_trades ? d.win_rate.toFixed(1) + '%' : '—';
  $('s-eq').textContent = '$' + F(d.equity);
  $('s-daily').textContent = '$' + (d.daily_pnl >= 0 ? '+' : '') + F(d.daily_pnl);
  $('s-trades').textContent = d.total_trades;
  $('s-pos').textContent = d.num_positions + ' / 5';
  if (d.positions && d.positions.length) {
    $('pos-empty').style.display = 'none';
    $('pos-table').style.display = 'table';
    $('pos-tbody').innerHTML = d.positions.map(p => '<tr><td>' + p.market + '</td><td><span class="tag t-' + p.side.toLowerCase() + '">' + p.side + '</span></td><td class="mono">$' + p.entry + '</td><td class="mono" style="color:var(' + (p.pnl >= 0 ? '--green' : '--red') + ')">$' + (p.pnl >= 0 ? '+' : '') + F(p.pnl) + '</td></tr>').join('');
  } else {
    $('pos-empty').style.display = 'block';
    $('pos-table').style.display = 'none';
  }
  $('trades-tbody').innerHTML = (d.trades || []).slice(0, 20).map(t => '<tr><td>' + t.time + '</td><td><span class="tag t-' + t.side.toLowerCase() + '">' + t.side + '</span></td><td class="mono">$' + t.entry + '</td><td class="mono">$' + F(t.exit) + '</td><td class="mono" style="color:var(' + (t.pnl >= 0 ? '--green' : '--red') + ')">$' + (t.pnl >= 0 ? '+' : '') + F(t.pnl) + '</td><td><span class="tag ' + (t.won ? 't-yes' : 't-no') + '">' + (t.won ? 'WIN' : 'LOSS') + '</span></td></tr>').join('');
  $('status-text').textContent = 'LIVE';
}
const ws = new WebSocket('ws://' + location.host + '/ws');
ws.onmessage = e => { try { render(JSON.parse(e.data)); } catch (_) {} };
ws.onclose = () => { $('status-text').textContent = 'DISCONNECTED'; };
</script>
</body>
</html>
